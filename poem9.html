  <h1>মই চৰাই</h1>
  <p class="author">— ঋতুৰাজ শইকীয়া</p>

  <div class="poem">
    <p>
মোৰ চৰাই হ'ব মন যায়<br>
মুকলি আকাশত উৰিবলৈ মন যায়,<br>
কাহিলী পুৱাতে গীত গাবলৈ মন যায়।<br>
খেতিয়কৰ বাবে কীট পটংগ মাৰি<br>
এজন খেতিয়কৰ সৈতে বন্ধুত্ব কৰিব মন যায়,<br>
মোৰ চৰাই হ'ব মন যায়।<br>
    
    </p>
<p>
</p>
